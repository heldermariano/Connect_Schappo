; ============================================================================
; PJSIP WebRTC endpoints para Connect Schappo
; Ramais 250-259 (WebRTC via WSS porta 8089)
; Copiar para /etc/asterisk/pjsip_custom.conf no Issabel (10.150.77.91)
; Depois: asterisk -rx "pjsip reload"
; ============================================================================

; --- Ramal 250 (compartilhado/legado) ---

[auth250]
type=auth
auth_type=userpass
username=250
password=Schappo250

[250]
type=aor
max_contacts=5
remove_existing=yes
qualify_frequency=30

[250]
type=endpoint
context=from-internal
disallow=all
allow=ulaw,alaw
webrtc=yes
direct_media=no
auth=auth250
aors=250
callerid="Connect Schappo" <250>
dtmf_mode=rfc4733
rtp_symmetric=yes
force_rport=yes
rewrite_contact=yes
dtls_verify=no

