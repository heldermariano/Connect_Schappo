services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - internal

  connect-schappo:
    build: .
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    env_file: .env
    environment:
      - NODE_ENV=production
      - TZ=America/Sao_Paulo
      - REDIS_URL=redis://redis:6379
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/api/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik_default"
      - "traefik.http.routers.connect.rule=Host(`connect.clinicaschappo.com`)"
      - "traefik.http.routers.connect.entrypoints=websecure"
      - "traefik.http.routers.connect.tls=true"
      - "traefik.http.routers.connect.tls.certresolver=letsencrypt"
      - "traefik.http.services.connect.loadbalancer.server.port=3000"
      - "traefik.http.services.connect.loadbalancer.healthcheck.path=/api/health"
      - "traefik.http.services.connect.loadbalancer.healthcheck.interval=10s"
      # SSE: desabilitar buffering para eventos em tempo real
      - "traefik.http.middlewares.connect-sse.headers.customresponseheaders.Cache-Control=no-cache"
      - "traefik.http.middlewares.connect-sse.headers.customresponseheaders.X-Accel-Buffering=no"
      - "traefik.http.routers.connect.middlewares=connect-sse"
    networks:
      - traefik_default
      - internal
    ports:
      - "3000:3000"
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  redis_data:

networks:
  internal:
  traefik_default:
    external: true
